version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: avito_server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run start

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: avito_client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_OLLAMA_URL: http://localhost:11434
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - server
    command: npm run dev -- --host 0.0.0.0